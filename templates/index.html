<!DOCTYPE html>
<html>

<head>
<title>Before After Video Tool</title>
</head>

<body>

<h2>Before / After Video Generator</h2>

<form action="/process" method="post" enctype="multipart/form-data">

<p>Upload BEFORE video</p>
<input type="file" name="before" required>

<br><br>

<p>Upload AFTER video</p>
<input type="file" name="after" required>

<br><br>

<button type="submit">Generate Video</button>

</form>

</body>
</html>
